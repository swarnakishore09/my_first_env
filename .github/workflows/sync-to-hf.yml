name: Sync to Hugging Face Space
on:
  push:
    branches: [main]

jobs:
  push-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://swarnakishore:$HF_TOKEN@huggingface.co/spaces/swarnakishore/my_first_env main
